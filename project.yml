name: QuartetDesk
options:
  bundleIdPrefix: tv.affirmi
  deploymentTarget:
    macOS: "14.0"

packages:
  QuartetDeskKit:
    path: .
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.36.0"

targets:
  QuartetDesk:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: QuartetDeskKit
        product: QuartetUI
      - package: Sentry
        product: Sentry
    entitlements:
      path: App/QuartetDesk.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Quartet Desk
        NSHumanReadableCopyright: "© 2026 Affirmi Inc."
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        # Committed value is the EMPTY STRING by design: crash reporting can
        # only ever activate in release builds where CI injects a real DSN
        # (and even then only after the user opts in via Settings → Privacy).
        SENTRY_DSN: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.affirmi.quartetdesk
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        # App icon + global accent come from App/Assets.xcassets. Regenerate
        # the icon PNGs with: swift scripts/generate-appicon.swift
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES

  # Live UI smoke test (spends real tokens): drives one full quartet run through
  # the real UI and attaches screenshots. Run:
  #   xcodebuild test -project QuartetDesk.xcodeproj -scheme QuartetDesk
  QuartetDeskUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: QuartetDesk
    settings:
      base:
        TEST_TARGET_NAME: QuartetDesk
        PRODUCT_BUNDLE_IDENTIFIER: tv.affirmi.quartetdesk.uitests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

schemes:
  QuartetDesk:
    build:
      targets:
        QuartetDesk: all
        QuartetDeskUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuartetDeskUITests
